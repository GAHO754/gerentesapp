<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gerentes | Applebee’s Lealtad</title>

  <link rel="icon" type="image/png" sizes="32x32" href="manzanas.png" />
  <link rel="stylesheet" href="gerente.css" />
</head>

<body>
  <main class="manager-auth-page">
    <section class="manager-auth-card">
      <div class="manager-brand">
        <div class="manager-logo">
          <img src="manzanas.png" alt="Applebee's" />
        </div>

        <h1>Applebee’s</h1>
        <p>Acceso de gerentes</p>
      </div>

      <h2>Iniciar sesión</h2>

      <div class="form-group">
        <label>Correo de gerente</label>
        <input type="email" id="emailGerente" placeholder="gerente@applebees.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>

        <div class="password-box">
          <input type="password" id="passwordGerente" placeholder="Tu contraseña" />
          <span class="toggle-pass" onclick="togglePasswordGerente()">👁️</span>
        </div>
      </div>

      <button class="btn-primary" onclick="loginGerente()">
        Entrar al panel
      </button>

      <p class="auth-note">
        Acceso exclusivo para gerentes y administradores autorizados.
      </p>
    </section>
  </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

    <script src="firebase.js"></script>
    <script src="gerente.js"></script>
</body>
</html>
